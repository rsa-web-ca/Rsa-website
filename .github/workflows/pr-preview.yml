name: PR deploy preview

on:
  pull_request:
    types: [opened, reopened, synchronize, closed]

concurrency:
  group: pr-preview-${{ github.event.number }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  preview:
    # Fork PRs get a read-only token so the deploy step would fail;
    # previews only run for branches on this repository.
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - if: github.event.action != 'closed'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: github.event.action != 'closed'
        run: npm ci

      - name: Build
        if: github.event.action != 'closed'
        run: npm run build -- --base=/Rsa-website/pr-preview/pr-${{ github.event.number }}/

      - name: Deploy preview
        # Publishes to gh-pages under pr-preview/pr-<number>/, posts a sticky
        # comment with the preview URL, and removes the preview when the PR
        # is closed or merged.
        uses: rossjrw/pr-preview-action@ffa7509e91a3ec8dfc2e5536c4d5c1acdf7a6de9 # v1
        with:
          source-dir: dist
          # Only wait for the Pages build on deploy: it ensures the preview
          # URL is live before the comment is posted. On close there's no
          # comment or URL to wait for, and GitHub Pages builds have been
          # erroring on the "remove" commits, failing the job for no reason.
          wait-for-pages-deployment: ${{ github.event.action != 'closed' }}
