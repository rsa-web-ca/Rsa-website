name: PR deploy preview

on:
  pull_request:
    types: [opened, reopened, synchronize, closed]

concurrency:
  group: pr-preview-${{ github.event.number }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  preview:
    # Fork PRs get a read-only token so the deploy step would fail;
    # previews only run for branches on this repository.
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - if: github.event.action != 'closed'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: github.event.action != 'closed'
        run: npm ci

      - name: Build
        if: github.event.action != 'closed'
        run: npm run build -- --base=/Rsa-website/pr-preview/pr-${{ github.event.number }}/

      - name: Deploy preview
        # Publishes to gh-pages under pr-preview/pr-<number>/, posts a sticky
        # comment with the preview URL, and removes the preview when the PR
        # is closed or merged.
        uses: rossjrw/pr-preview-action@ffa7509e91a3ec8dfc2e5536c4d5c1acdf7a6de9 # v1
        with:
          source-dir: dist
          # wait-for-pages-deployment polls GitHub's Pages build API and has
          # proven unreliable here: it has timed out waiting for a build to
          # even start on deploy, and seen builds reported as "errored" on
          # remove. The gh-pages push itself (which is what actually matters)
          # has succeeded every time, so don't let this flaky check fail CI.
